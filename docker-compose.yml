services:
  db:
    image: pgvector/pgvector:pg16
    container_name: veritas-postgres
    restart: always
    environment:
      POSTGRES_DB: veritas
      POSTGRES_USER: veritas
      POSTGRES_PASSWORD: veritas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: veritas-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veritas-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://veritas:veritas@db:5432/veritas
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veritas-worker
    command: python backend/app/worker.py
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://veritas:veritas@db:5432/veritas
    depends_on:
      - redis
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: veritas-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
