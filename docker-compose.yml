# docker-compose.yml — Full Veritas Stack
# Usage: docker compose up -d --build
# Docs:  See README.md for details

services:
  # ── PostgreSQL Database ──────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: veritas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: veritas
      POSTGRES_USER: veritas
      POSTGRES_PASSWORD: veritas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veritas -d veritas"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis Cache ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: veritas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veritas-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://veritas:veritas@db:5432/veritas
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Seed the database on first boot, then start the API
    command: >
      bash -c "
        python -m backend.app.seed || echo 'Seed skipped';
        uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
      "

  # ── Background Worker ───────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veritas-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://veritas:veritas@db:5432/veritas
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python backend/app/worker.py

  # ── React Frontend (Nginx) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: veritas-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:

